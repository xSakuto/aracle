<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakuto — Links</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0b;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.45);
  --aqua: #00ffff;
  --aqua-glow: rgba(0,255,255,0.15);
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html { font-size: 10px; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  position: relative;
  overflow: hidden;
}

/* Background glow */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 60vw;
  height: 60vw;
  background: radial-gradient(circle, rgba(0,255,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.card {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
  z-index: 1;
}

/* Avatar */
.avatar {
  width: 9rem;
  height: 9rem;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(0,255,255,0.25);
  margin-bottom: 1.6rem;
  box-shadow: 0 0 0 6px rgba(0,255,255,0.06);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.name {
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}

.handle {
  font-size: 1.3rem;
  color: var(--aqua);
  letter-spacing: 0.02em;
  margin-bottom: 0.6rem;
}

.bio {
  font-size: 1.3rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
  max-width: 30ch;
  margin-bottom: 3rem;
}

/* Links */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.link-btn {
  display: flex;
  align-items: center;
  gap: 1.4rem;
  padding: 1.4rem 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 1.4rem;
  color: var(--text);
  text-decoration: none;
  font-size: 1.45rem;
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: background 0.18s, border-color 0.18s, transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
  position: relative;
  overflow: hidden;
}

.link-btn:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(0,255,255,0.3);
  transform: translateY(-2px);
}

.link-btn:active { transform: translateY(0); }

.link-btn svg {
  width: 2rem;
  height: 2rem;
  flex-shrink: 0;
  opacity: 0.85;
}

.link-btn .link-arrow {
  margin-left: auto;
  opacity: 0.35;
  font-size: 1.3rem;
}

/* Instagram specific */
.link-btn.instagram .link-icon { color: #e1306c; }
.link-btn.twitter .link-icon { color: var(--text); }

/* Powered by */
.powered {
  margin-top: 4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
}

.powered span {
  font-size: 1.1rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.powered img {
  height: 1.8rem;
  width: auto;
  opacity: 0.4;
  transition: opacity 0.18s;
}

.powered img:hover { opacity: 0.7; }
</style>
</head>
